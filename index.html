<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #e9ecef;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* SINGLE CARD */
.container {
    width: 92%;
    max-width: 380px;
    background: linear-gradient(180deg, #3a6f5f, #2c5e50);
    border-radius: 25px;
    padding: 20px 16px;
    text-align: center;
    color: white;
    box-shadow: 
        0 10px 30px rgba(0,0,0,0.25),
        0 0 25px rgba(0,255,150,0.25);
}

/* Tag */
.tag {
    background: #4CAF50;
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 13px;
    display: inline-block;
    margin-bottom: 12px;
    box-shadow: 0 0 10px rgba(76,175,80,0.6);
}

/* Profile */
.profile {
    width: 85px;
    height: 85px;
    border-radius: 50%;
    background: url('profile.jpg') center/cover no-repeat;
    margin: 10px auto;
    border: 2px solid rgba(255,255,255,0.3);
}

/* Title */
h1 {
    font-size: 20px;
    margin: 8px 0;
}

/* Subtitle */
.subtitle {
    font-size: 12.5px;
    opacity: 0.9;
    line-height: 1.4;
}

/* Timer */
.timer {
    margin: 12px 0;
    font-size: 13px;
    font-weight: bold;
}

/* BUTTON GLOW 🔥 */
.btn {
    background: #00e676;
    padding: 14px;
    border-radius: 30px;
    display: block;
    text-decoration: none;
    color: black;
    font-weight: bold;
    font-size: 15px;
    margin: 12px 0;
    box-shadow: 
        0 6px 15px rgba(0,0,0,0.2),
        0 0 15px rgba(0,230,118,0.8),
        0 0 30px rgba(0,230,118,0.5);
    transition: 0.3s;
    animation: glowPulse 2s infinite;
}

/* Hover */
.btn:hover {
    transform: scale(1.05);
    box-shadow: 
        0 8px 20px rgba(0,0,0,0.3),
        0 0 25px rgba(0,230,118,1),
        0 0 45px rgba(0,230,118,0.8);
}

/* Glow animation */
@keyframes glowPulse {
    0% { box-shadow: 0 0 10px rgba(0,230,118,0.6); }
    50% { box-shadow: 0 0 25px rgba(0,230,118,1); }
    100% { box-shadow: 0 0 10px rgba(0,230,118,0.6); }
}

/* Footer */
.footer-text {
    font-size: 12px;
    opacity: 0.85;
}

/* Divider */
hr {
    border: 0;
    border-top: 1px dashed rgba(255,255,255,0.3);
    margin: 14px 0;
}

/* Links */
.links {
    margin-top: 8px;
    text-align: center;
}
.links a {
    color: #90caf9;
    font-size: 11px;
    text-decoration: none;
    margin: 0 5px;
}

/* Managed */
.managed {
    margin-top: 10px;
    font-size: 11px;
}
.managed a {
    color: #ffd54f;
    text-decoration: none;
}
</style>
