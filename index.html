<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COME11 TEAM 2026</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eaf6ff, #e9fff3);
    }

    .card {
      background: #ffffff;
      width: 360px;
      max-width: 92%;
      border-radius: 18px;
      padding: 28px 24px 30px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.08);
    }

    .logo {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: #000;
      margin: 0 auto 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid #2563eb;
    }

    .logo img {
      width: 70px;
      height: 70px;
      object-fit: contain;
      border-radius: 50%;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1c2b4a;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    /* CTA BUTTON */
    .btn {
      display: block;
      width: 100%;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      text-decoration: none;
      padding: 14px 0;
      border-radius: 10px;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.3px;
      animation: ctaPulse 2.2s infinite;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      background: linear-gradient(135deg, #1e40af, #1d4ed8);
      transform: translateY(-2px);
    }

    .btn:active {
      transform: scale(0.98);
    }

    @keyframes ctaPulse {
      0% {
        box-shadow: 0 0 0 0 rgba(29, 78, 216, 0.6);
      }
      50% {
        box-shadow: 0 0 18px 6px rgba(29, 78, 216, 0.25);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(29, 78, 216, 0);
      }
    }

    /* RIPPLE EFFECT */
    .btn span {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      animation: ripple 600ms linear;
      background: rgba(255, 255, 255, 0.6);
      pointer-events: none;
    }

    @keyframes ripple {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    .features {
      text-align: left;
      margin-top: 22px;
    }

    .feature {
      display: flex;
      align-items: center;
      font-size: 14px;
      color: #374151;
      margin-bottom: 12px;
    }

    .check {
      color: #16a34a;
      font-size: 16px;
      margin-right: 10px;
    }

    .footer {
      margin-top: 18px;
      font-size: 11px;
      color: #9ca3af;
    }
  </style>

</head>
<body>

  <div class="card">

    <!-- LOGO -->
    <div class="logo">
      <!-- Replace logo.png -->
      <img src="come11.jpg" alt="Logo">
    </div>

    <!-- TITLE -->
    <h1>COME11 FANTASY TEAM 2026</h1>

    <!-- SUBTITLE -->
    <p class="subtitle">
      Smart match perspective & clean insights —
      simplified for serious cricket followers.
    </p>

    <!-- CTA -->
    <a href="https://telegram.me/+HGaBUXxGXd5mOGVl" class="btn">
      Limited Free Access - Join Now
    </a>

    <!-- FEATURES -->
    <div class="features">
      <div class="feature"><span class="check">✔</span> Daily Match Insights</div>
      <div class="feature"><span class="check">✔</span> Strong Pre-match Logic</div>
      <div class="feature"><span class="check">✔</span> High-accuracy Reads</div>
      <div class="feature"><span class="check">✔</span> Free Access Limited Time</div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      © 2025 COME11 FANTASY TEAM 2026 | All Rights Reserved
    </div>

  </div>

  <!-- RIPPLE SCRIPT -->
  <script>
    document.querySelectorAll('.btn').forEach(button => {
      button.addEventListener('click', function (e) {
        const span = document.createElement('span');
        const size = Math.max(this.clientWidth, this.clientHeight);
        const rect = this.getBoundingClientRect();

        span.style.width = span.style.height = size + 'px';
        span.style.left = e.clientX - rect.left - size / 2 + 'px';
        span.style.top = e.clientY - rect.top - size / 2 + 'px';

        this.appendChild(span);

        setTimeout(() => span.remove(), 600);
      });
    });
  </script>

</body>
